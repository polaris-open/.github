name: Documentation improvement
description: Report unclear, missing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the documentation issue?
      description: Link or path to the file, section, or page with the problem.
      placeholder: e.g. CONTRIBUTING.md, README section "Getting started"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is unclear, missing, or outdated?
      description: Describe the problem with the current documentation.
      placeholder: The current text says X, but it is confusing / incorrect / missing because...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How would you improve it? A draft, a rewrite, or just a direction is fine.
      placeholder: Optional — a suggested replacement or direction for improvement.
    validations:
      required: false
