name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you are experiencing.
      placeholder: I'm trying to do X, but currently...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change or capability you would like to see.
      placeholder: A clear description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches? Why did you prefer this one?
      placeholder: Optional — describe other approaches you considered.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area does this feature request apply to?
      options:
        - Documentation
        - Learning material
        - Starter project
        - Tooling
        - Community
        - Other
    validations:
      required: true
